# submoduleはcheckoutしない(soramimic本体はprivateのためGITHUB_TOKENで取れない)。
# 替え歌変換は soramimic ライブラリ(uv syncで導入)でPython完結するため、
# convert/editor 連携のテストもCIで実行される(editor_io の conf/setting.json 参照は
# submodule未取得でもフォールバックする)。
name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: uv sync --extra api
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest -q
